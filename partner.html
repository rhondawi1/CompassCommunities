<script>
(function(){
  function applyContrast(){
    const mode = localStorage.getItem('contrast') || 'standard';
    document.documentElement.setAttribute('data-contrast', mode === 'high' ? 'high' : 'standard');
    const btn = document.getElementById('contrastToggle');
    if(btn) btn.textContent = mode === 'high' ? 'Contrast: High' : 'Contrast: Standard';
  }
  function toggleContrast(){
    const cur = localStorage.getItem('contrast') || 'standard';
    localStorage.setItem('contrast', cur === 'high' ? 'standard' : 'high');
    applyContrast();
  }
  document.addEventListener('DOMContentLoaded', function(){
    // Inject a small toggle button into the header nav if present
    const nav = document.querySelector('header nav');
    if(nav && !document.getElementById('contrastToggle')){
      const wrap = document.createElement('span');
      wrap.style.marginLeft = '12px';
      wrap.innerHTML = '<button id="contrastToggle" class="btn" type="button" aria-pressed="false">Contrast: Standard</button>';
      nav.appendChild(wrap);
      wrap.querySelector('button').addEventListener('click', toggleContrast);
    }
    applyContrast();
  });
})();
</script>
